name: QorLang Compiler CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --results-directory ./test-results --report-xunit-trx

      - name: Report Results
        uses: dorny/test-reporter@v2
        if: ${{ !cancelled() }}
        with:
          name: xUnit Tests
          path: ./test-results/*.trx
          reporter: dotnet-trx

      - name: Upload Results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-results
          path: './test-results/*.trx'